name: Django CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run checks
        env:
          DJANGO_ENV: test
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: "False"
        run: python manage.py check

      - name: Run deploy checks
        env:
          DJANGO_ENV: production
          DJANGO_SECRET_KEY: ci-secret-key-with-more-than-fifty-characters-1234567890
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: ci.example.com
          DJANGO_CSRF_TRUSTED_ORIGINS: https://ci.example.com
          DJANGO_SESSION_COOKIE_SECURE: "True"
          DJANGO_CSRF_COOKIE_SECURE: "True"
          DJANGO_SECURE_SSL_REDIRECT: "True"
          DJANGO_USE_X_FORWARDED_PROTO: "True"
          DJANGO_ENABLE_CSP: "True"
        run: python manage.py check --deploy

      - name: Run tests
        env:
          DJANGO_ENV: test
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: "False"
        run: python manage.py test
