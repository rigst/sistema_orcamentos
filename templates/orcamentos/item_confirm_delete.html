<div class="panel modal-panel">
    <h3>Excluir item</h3>
    <p class="muted">Tem certeza que deseja excluir <strong>{{ item.nome }}</strong>?</p>

    <form
        method="post"
        hx-post="{% url 'orcamentos:item_excluir' orcamento.pk item.pk %}"
        hx-target="#orcamento-page"
        hx-swap="outerHTML">
        {% csrf_token %}
        <div class="inline-actions">
            <button class="btn btn-primary" type="submit">Confirmar exclusão</button>
            <button class="btn btn-secondary" type="button" onclick="document.getElementById('modal-content').innerHTML=''">
                Cancelar
            </button>
        </div>
    </form>
</div>
