{% extends "base.html" %}

{% block title %}Excluir item{% endblock %}

{% block content %}
<section>
    <div class="panel">
        <h2>Excluir item</h2>
        <p>Tem certeza que deseja excluir o item <strong>{{ item.nome }}</strong> do orçamento <strong>{{ orcamento.numero }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <div class="inline-actions" style="margin-top: 1rem;">
                <button class="btn btn-danger" type="submit">Confirmar exclusão</button>
                <a class="btn btn-secondary" href="{% url 'orcamentos:editar' orcamento.pk %}">Cancelar</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
