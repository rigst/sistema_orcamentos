{% extends "base.html" %}

{% block title %}Excluir orçamento{% endblock %}

{% block content %}
<section>
    <div class="section-heading">
        <div>
            <h2>Excluir orçamento</h2>
            <p>Revise a operação antes de confirmar a remoção definitiva.</p>
        </div>
        <div class="inline-actions">
            <a class="btn btn-secondary" href="{% url 'orcamentos:lista' %}">Voltar</a>
        </div>
    </div>

    <div class="panel">
        <p>Tem certeza que deseja excluir o orçamento <strong>{{ orcamento.numero }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <div class="inline-actions" style="margin-top: 1rem;">
                <button class="btn btn-primary" type="submit">Confirmar exclusão</button>
                <a class="btn btn-secondary" href="{% url 'orcamentos:lista' %}">Cancelar</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
