{% extends "base.html" %}

{% block title %}Página não encontrada{% endblock %}

{% block content %}
<section class="error-page">
    <div class="ds-card error-card">
        <span class="ds-kicker">Erro 404</span>
        <h2 class="ds-h2">Página não encontrada</h2>
        <p>O endereço que você tentou acessar não existe, mudou de lugar ou expirou.</p>
        <div class="inline-actions">
            <a class="ds-btn ds-btn--solid" href="{% url 'dashboard' %}">Ir para o início</a>
        </div>
    </div>
</section>
{% endblock %}
