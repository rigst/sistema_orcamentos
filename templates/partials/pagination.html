{% load querystring %}
{% if page_obj and page_obj.paginator.num_pages > 1 %}
    <nav class="pagination" aria-label="Paginação">
        {% if page_obj.has_previous %}
            <a class="btn btn-secondary" href="{% querystring page=page_obj.previous_page_number %}">Anterior</a>
        {% endif %}
        <span class="pagination-summary">Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
        {% if page_obj.has_next %}
            <a class="btn btn-secondary" href="{% querystring page=page_obj.next_page_number %}">Próxima</a>
        {% endif %}
    </nav>
{% endif %}
