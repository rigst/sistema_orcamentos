{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <h2>Entrar</h2>

    {% if form.errors %}
        <p>Usuário ou senha inválidos.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>
{% endblock %}
