{% extends "base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<section>
    <div class="section-heading">
        <div>
            <h2>{{ titulo }}</h2>
        </div>
        <div>
            <a class="btn btn-secondary" href="{% url 'relatorios:configuracao_lista' %}">Voltar para a lista</a>
        </div>
    </div>

    <div class="panel form-panel">
        <form method="post" enctype="multipart/form-data" data-unsaved-warning="1">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="inline-actions">
                <button class="btn btn-primary" type="submit">Salvar</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
